<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator | UI/UX Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrapper">
      <div class="qr-card">
        <h1>QR Code Generator</h1>
        <p class="subtitle">Generate QR codes instantly from text or URLs</p>

        <input type="text" placeholder="Enter text or URL" id="qrText" />

        <div id="imgBox">
          <img src="" id="qrImg" />
        </div>

        <button onclick="generateQR()">Generate QR Code</button>
      </div>

      <footer>Designed & Developed by Rohit Walvekar</footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
